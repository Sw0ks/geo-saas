# Nginx reverse proxy для GEO Analytics SaaS
#
# Роутинг:
#   /v1/track   → backend:8000  (публичный трекер без /api префикса)
#   /api/       → backend:8000  (FastAPI REST API)
#   /           → frontend:3000 (Next.js)

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Логи ──────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Производительность ────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml image/svg+xml;

    # ── Безопасность ──────────────────────────────────────────────────────────
    server_tokens      off;
    client_max_body_size 10m;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 16;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Общие заголовки для проксирования ─────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";
    proxy_read_timeout      60s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;

    # ── HTTP → HTTPS редирект (включить когда будет SSL-сертификат) ───────────
    # server {
    #     listen 80;
    #     server_name yourdomain.ru;
    #     return 301 https://$host$request_uri;
    # }

    # ── Основной сервер ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # принимаем все hostname (заменить на реальный домен)

        # Трекер AI-краулеров — публичный эндпоинт, высокий трафик
        # Короткий таймаут: клиентский сниппет ждёт не более 1 сек
        location /v1/track {
            proxy_pass         http://backend;
            proxy_read_timeout 3s;
            proxy_send_timeout 3s;
        }

        # FastAPI REST API
        location /api/ {
            proxy_pass http://backend;
        }

        # Next.js frontend (всё остальное)
        location / {
            proxy_pass http://frontend;

            # Поддержка Next.js HMR WebSocket (dev-режим)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── HTTPS-сервер (раскомментировать после получения сертификата) ──────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.ru;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:
    #                         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     location /v1/track { proxy_pass http://backend; proxy_read_timeout 3s; }
    #     location /api/     { proxy_pass http://backend; }
    #     location /         { proxy_pass http://frontend; }
    # }
}
